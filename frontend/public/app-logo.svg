<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- White Rounded Container -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)" />

  <!-- Icon Group (Centered) -->
  <g transform="translate(32, 28)">
    <!-- Vertical Stem -->
    <path d="M10 10 L10 82" stroke="#1e1b4b" stroke-width="8" stroke-linecap="round" />
    
    <!-- Top Horizontal Stroke -->
    <path d="M10 14 L54 14" stroke="#1e1b4b" stroke-width="8" stroke-linecap="round" />
    
    <!-- Middle Trend Line with Gradient -->
    <path d="M10 46 L38 46 L54 30" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Accent Node -->
    <circle cx="58" cy="26" r="7" fill="#06b6d4" />
  </g>
</svg>